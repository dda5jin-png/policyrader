<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a6b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a3a6b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e63946" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#e63946" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a3a6b"/>
  <circle cx="100" cy="100" r="90" fill="#0d2244"/>

  <!-- Radar rings -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#2a5298" stroke-width="1" opacity="0.7"/>
  <circle cx="100" cy="100" r="50" fill="none" stroke="#2a5298" stroke-width="1" opacity="0.7"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="#2a5298" stroke-width="1" opacity="0.7"/>

  <!-- Crosshairs -->
  <line x1="100" y1="22" x2="100" y2="178" stroke="#2a5298" stroke-width="0.8" opacity="0.5"/>
  <line x1="22" y1="100" x2="178" y2="100" stroke="#2a5298" stroke-width="0.8" opacity="0.5"/>

  <!-- Radar sweep (wedge) -->
  <path d="M100,100 L170,30 A90,90 0 0,1 190,100 Z" fill="url(#sweepGrad)" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="100" cy="100" r="5" fill="#e63946"/>

  <!-- House icon in center (simplified) -->
  <g transform="translate(100,100)">
    <!-- Roof -->
    <polygon points="0,-22 -16,-8 16,-8" fill="#ffffff" opacity="0.95"/>
    <!-- Body -->
    <rect x="-11" y="-8" width="22" height="16" fill="#ffffff" opacity="0.95"/>
    <!-- Door -->
    <rect x="-4" y="1" width="8" height="7" fill="#1a3a6b"/>
    <!-- Chimney -->
    <rect x="6" y="-24" width="5" height="8" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Radar blip dots -->
  <circle cx="148" cy="60" r="3" fill="#e63946" opacity="0.9"/>
  <circle cx="60" cy="130" r="2.5" fill="#e63946" opacity="0.7"/>
  <circle cx="130" cy="140" r="2" fill="#e63946" opacity="0.5"/>
</svg>
