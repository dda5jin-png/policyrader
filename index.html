<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Policy Radar | AI Intelligence Pipeline</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">

  <!-- Typography -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  
  <style>
    :root {
      --primary: #0f172a;
      --accent: #f43f5e;
      --accent-soft: rgba(244, 63, 94, 0.1);
      --bg: #030712;
      --card-bg: rgba(30, 41, 59, 0.5);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass: rgba(15, 23, 42, 0.8);
      --blur: blur(16px);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(244, 63, 94, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.5) 0px, transparent 50%);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #e11d48);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px var(--accent-soft);
    }

    /* ── Hero ── */
    .hero {
      padding: 60px 24px;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .hero-tag {
      display: inline-block;
      padding: 6px 14px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Slogan Section ── */
    .slogan-section {
      max-width: 900px;
      margin: -20px auto 40px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .slogan-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.03);
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
    }
    .slogan-item svg { color: var(--accent); }

    /* ── Filter ── */
    .filter-container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }
    .filter-wrap {
      padding: 0 20px;
      overflow-x: auto;
      display: flex;
      justify-content: center;
      gap: 10px;
      scrollbar-width: none;
      margin-bottom: 12px;
    }
    .filter-wrap::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 10px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--accent-soft);
    }
    .cat-desc {
      font-size: 0.8rem;
      color: #71717a;
      margin-bottom: 30px;
      min-height: 1.2rem;
    }

    /* ── Content ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 120px;
    }
    .post-grid {
      display: grid;
      gap: 20px;
    }

    /* ── Card ── */
    .post-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .post-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(to right, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .post-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: var(--shadow-lg);
    }
    .post-card:hover::before { opacity: 1; }

    .card-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cat-T { background: #fee2e2; color: #991b1b; } /* 거래 */
    .cat-F { background: #dcfce7; color: #166534; } /* 금융 */
    .cat-X { background: #fef9c3; color: #854d0e; } /* 세제 */
    .cat-S { background: #dbeafe; color: #1e40af; } /* 공급 */
    .cat-R { background: #ffedd5; color: #9a3412; } /* 임대 */
    .cat-P { background: #f3e8ff; color: #6b21a8; } /* 프롭테크 */

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-main);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      width: 100%;
      max-width: 700px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 24px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 40px 30px;
      position: relative;
      animation: modalFade 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white;
    }

    .info-label {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 800;
      margin: 32px 0 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex; align-items: center; gap: 8px;
    }
    .info-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .summary-list { list-style: none; }
    .summary-item {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      display: flex; gap: 12px;
    }
    .summary-item::before { content: "→"; color: var(--accent); font-weight: 900; }

    .table-container { overflow-x: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 400px; }
    th { text-align: left; font-size: 0.75rem; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); }
    td { padding: 12px; font-size: 0.9rem; border-bottom: 1px solid rgba(255, 255, 255, 0.02); }

    .expert-box {
      background: linear-gradient(135deg, rgba(244, 63, 94, 0.1), transparent);
      border: 1px solid var(--accent-soft);
      padding: 24px;
      border-radius: 16px;
      font-style: italic;
      line-height: 1.7;
    }

    /* ── Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: var(--glass);
      backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      padding: 12px 30px;
      border-radius: 100px;
      display: flex; gap: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      z-index: 1500;
    }
    .nav-btn { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-decoration: none; }
    .nav-btn { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-decoration: none; }
    .nav-btn.active { color: var(--accent); }

    /* ── Action Buttons in Modal ── */
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      justify-content: center;
    }
    .action-btn {
      flex: 1;
      max-width: 160px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
    .action-btn.primary { background: white; color: black; border: none; }
    .action-btn.primary:hover { background: #e2e8f0; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #18181b;
      color: white;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Print Layout ── */
    @media print {
      body * { visibility: hidden !important; }
      #modal, #modalContent, #modalContent * { visibility: visible !important; display: block !important; }
      #modal { position: absolute; top: 0; left: 0; background: white !important; padding: 0 !important; }
      #modalContent { width: 100% !important; max-width: none !important; background: white !important; color: black !important; border: none !important; padding: 0 !important; max-height: none !important; }
      .modal-close, .modal-actions, .info-label::after { display: none !important; }
      .info-label { color: black !important; border-bottom: 2px solid black !important; }
      .summary-item { background: #f4f4f5 !important; color: black !important; border: 1px solid #e4e4e7 !important; }
      .expert-box { background: #fef2f2 !important; color: black !important; border: 1px solid #fecaca !important; }
      td, th { color: black !important; border-bottom: 1px solid #e4e4e7 !important; }
      h1 { color: black !important; }
      .badge { border: 1px solid black !important; background: white !important; color: black !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"/>
        </svg>
      </div>
      POLICY RADAR
    </a>
    <div id="status" style="font-size: 0.7rem; color: var(--text-muted); text-align: right;">Loading...</div>
  </div>
</header>

<section class="hero">
  <div class="hero-tag">Policy Radar AI Pipeline</div>
  <h1>복잡한 부동산 정책 흐름을<br>가장 빠르고 정확하게 분석합니다.</h1>
  <p style="color: var(--text-muted); opacity: 0.8">국토교통부·금융위 보도자료를 AI가 실시간 스캔하여<br>실질적인 시장 영향과 체크리스트를 도출합니다.</p>
</section>

<div class="slogan-section">
  <div class="slogan-item">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
      <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    모든 분석은 정부 공식 브리핑 원문만을 기반으로 합니다. (편집 없는 팩트)
  </div>
  <div class="slogan-item">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
      <path d="M8.684 4.087c.862-1.446 2.34-2.587 4.316-2.587 2.34 0 4.148 1.808 4.148 4.148 0 .862-.258 1.638-.733 2.284.475.646.733 1.422.733 2.284 0 2.34-1.808 4.148-4.148 4.148-2.34 0-4.148-1.808-4.148-4.148 0-.862.258-1.638.733-2.284-.475-.646-.733-1.422-.733-2.284 0-2.34 1.808-4.148 4.148-4.148zM5 13c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-4c0-1.1-.9-2-2-2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    분석 자료는 자유롭게 공유하거나 PDF로 인쇄/저장할 수 있습니다.
  </div>
</div>

<div class="filter-container">
  <div class="filter-wrap" id="filters">
    <button class="filter-btn active" data-cat="all">전체</button>
    <button class="filter-btn" data-cat="F">부동산 금융정책</button>
    <button class="filter-btn" data-cat="X">부동산 세금정책</button>
    <button class="filter-btn" data-cat="S">부동산 공급·개발정책</button>
    <button class="filter-btn" data-cat="T">부동산 거래·법령</button>
    <button class="filter-btn" data-cat="R">부동산 임대·주거정책</button>
  </div>
  <div class="cat-desc" id="catDesc">전체 부동산 관련 정책 자료를 모두 표시합니다.</div>
</div>

<main>
  <div id="container" class="post-grid">
    <!-- Cards will be injected here -->
  </div>
</main>

<!-- Bottom nav removed per user request -->

<div class="modal-overlay" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div id="toast">복사되었습니다.</div>

<script>
let posts = [];
let cat = 'all';

const CAT_INFO = {
  all: "전체 부동산 관련 정책 자료를 모두 표시합니다.",
  F: "대출 규제, 금리, 보증제도 등 금융 관련 부동산 정책을 분석합니다.",
  X: "취득세·양도세·종부세 등 부동산 과세 관련 정책을 분석합니다.",
  S: "신규 공급, 재개발·재건축, 택지개발 관련 정책을 분석합니다.",
  T: "계약, 중개, 등기, 관련 법령 개정 등 거래 제도 정책을 분석합니다.",
  R: "전월세 규제, 공공임대, 주거 복지 관련 정책을 분석합니다."
};

async function init() {
  try {
    const res = await fetch('posts.json?v=' + Date.now());
    posts = await res.json();
    render();
    
    if (posts.length > 0) {
      document.getElementById('status').innerHTML = `Last updated<br><b>${posts[0].date}</b>`;
    }

    // URL 파라미터 확인 (Deep Link)
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    if (postId) {
      setTimeout(() => show(postId), 500);
    }
  } catch (e) {
    console.error("Data load failed:", e);
    document.getElementById('container').innerHTML = '<div style="text-align:center;padding:100px;color:gray">데이터를 불러올 수 없습니다.</div>';
  }
}

function render() {
  const container = document.getElementById('container');
  const filtered = cat === 'all' ? posts : posts.filter(p => p.cat === cat);
  
  document.getElementById('catDesc').innerText = CAT_INFO[cat] || "";

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:100px;color:gray">해당 데이터가 아직 없습니다.</div>';
    return;
  }

  container.innerHTML = filtered.map((p, i) => `
    <div class="post-card" style="animation: modalFade 0.5s ease backwards ${i * 0.05}s" onclick="show('${p.id}')">
      <div class="card-head">
        <span class="badge cat-${p.cat}">${p.catName}</span>
        <span style="font-size:0.75rem; color:var(--text-muted)">${p.date}</span>
      </div>
      <h2 class="card-title">${p.headline}</h2>
      <div class="card-footer">
        <span>${p.source}</span>
        <span>•</span>
        <span>Premium Analysis</span>
      </div>
    </div>
  `).join('');
}

function show(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  
  content.innerHTML = `
    <div class="modal-close" onclick="closeM()">✕</div>
    <span class="badge cat-${p.cat}">${p.catName}</span>
    <h1 style="margin:20px 0; line-height:1.3">${p.headline}</h1>
    <p style="color:var(--text-muted); font-size:0.85rem">발행: ${p.date} | 출처: ${p.source}</p>

    <div class="info-label">핵심 정책 요약</div>
    <div class="summary-list">
      ${p.summary.map(s => `<div class="summary-item">${s}</div>`).join('')}
    </div>

    <div class="info-label">전문가 시나리오 분석</div>
    <div class="expert-box">
      "${p.expertOpinions[0].comment}"
      <p style="margin-top:16px; font-weight:700; font-size:0.8rem; text-align:right; font-style:normal; color:var(--accent)">
        — ${p.expertOpinions[0].name} (${p.expertOpinions[0].affiliation})
      </p>
    </div>

    <div class="info-label">데이터 세부 지표</div>
    <div class="table-container">
      <table>
        <thead><tr><th>항목</th><th>수치</th><th>비고</th></tr></thead>
        <tbody>
          ${p.keyData.map(d => `<tr><td>${d.항목}</td><td style="color:white;font-weight:700">${d.수치}</td><td>${d.적용대상}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="info-label">사용자 액션 체크리스트</div>
    <div class="summary-list">
      ${p.checklist.map(c => `<div class="summary-item" style="background:var(--accent-soft); border-left:3px solid var(--accent); border-radius:0 12px 12px 0">${c}</div>`).join('')}
    </div>

    <div class="modal-actions">
      <button class="action-btn" onclick="sharePost('${p.id}', '${p.headline.replace(/'/g, "\\'")}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M8.684 10.348L15.316 6.152M8.684 13.652L15.316 17.848M21 5a3 3 0 11-6 0 3 3 0 016 0zM21 19a3 3 0 11-6 0 3 3 0 016 0zM9 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        공유하기
      </button>
      <button class="action-btn" onclick="window.print()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        인쇄하기
      </button>
      <button class="action-btn primary" onclick="window.open('${p.sourceUrl}')">
        원문보기
      </button>
    </div>
  `;
  
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeM() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = 'auto';
  // URL에서 파라미터 제거
  window.history.replaceState({}, document.title, window.location.pathname);
}

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  cat = e.target.dataset.cat;
  render();
});

function sharePost(id, title) {
  const shareUrl = id === 'app' ? window.location.origin + window.location.pathname : `${window.location.origin}${window.location.pathname}?id=${id}`;
  if (navigator.share) {
    navigator.share({
      title: id === 'app' ? 'Policy Radar' : `[Policy Radar] ${title}`,
      text: '부동산 정책 지능형 리포트 보러가기',
      url: shareUrl
    });
  } else {
    navigator.clipboard.writeText(shareUrl).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    });
  }
}

init();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
