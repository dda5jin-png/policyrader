<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Policy Radar | AI Intelligence Pipeline</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">

  <!-- Typography -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  
  <style>
    :root {
      --primary: #0f172a;
      --accent: #f43f5e;
      --accent-soft: rgba(244, 63, 94, 0.1);
      --bg: #030712;
      --card-bg: rgba(30, 41, 59, 0.5);
      --border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --glass: rgba(15, 23, 42, 0.8);
      --blur: blur(16px);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.4);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg);
      background-image: 
        radial-gradient(at 0% 0%, rgba(244, 63, 94, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.5) 0px, transparent 50%);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
    }
    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 1.3rem;
      color: var(--text-main);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), #e11d48);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px var(--accent-soft);
    }

    /* ── Hero ── */
    .hero {
      padding: 60px 24px;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .hero-tag {
      display: inline-block;
      padding: 6px 14px;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 20px;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── Slogan Section ── */
    .slogan-section {
      max-width: 660px;
      margin: -20px auto 44px;
      padding: 0 20px;
    }
    .slogan-box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 16px;
      padding: 26px 30px 20px;
    }
    .slogan-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .slogan-item:last-of-type { margin-bottom: 0; }
    .slogan-item svg { color: var(--accent); flex-shrink: 0; margin-top: 3px; }
    .slogan-divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      margin: 18px 0 14px;
    }
    .slogan-notice {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.8rem;
      color: #f59e0b;
      font-weight: 500;
      line-height: 1.6;
    }
    .slogan-notice-mark {
      flex-shrink: 0;
      font-size: 0.95rem;
      margin-top: 1px;
    }

    /* ── Filter ── */
    .filter-container {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }
    .filter-wrap {
      padding: 0 20px;
      display: inline-grid;
      grid-template-columns: auto repeat(3, auto);
      gap: 10px;
      margin-bottom: 12px;
    }
    .filter-btn[data-cat="all"] {
      grid-row: span 2;
    }
    .filter-btn {
      padding: 10px 18px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 4px 12px var(--accent-soft);
    }
    .cat-desc {
      font-size: 0.8rem;
      color: #71717a;
      margin-bottom: 30px;
      min-height: 1.2rem;
    }

    /* ── Content ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px 120px;
    }
    .post-grid {
      display: grid;
      gap: 20px;
    }

    /* ── Card ── */
    .post-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .post-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(to right, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .post-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: var(--shadow-lg);
    }
    .post-card:hover::before { opacity: 1; }

    .card-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .badge {
      font-size: 0.65rem;
      font-weight: 800;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cat-T { background: #fee2e2; color: #991b1b; } /* 거래 */
    .cat-F { background: #dcfce7; color: #166534; } /* 금융 */
    .cat-X { background: #fef9c3; color: #854d0e; } /* 세제 */
    .cat-S { background: #dbeafe; color: #1e40af; } /* 공급 */
    .cat-R { background: #ffedd5; color: #9a3412; } /* 임대 */
    .cat-P { background: #f3e8ff; color: #6b21a8; } /* 프롭테크 */

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-main);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-content {
      width: 100%;
      max-width: 700px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 24px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 40px 30px;
      position: relative;
      animation: modalFade 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes modalFade { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: white;
    }

    .info-label {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 800;
      margin: 32px 0 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex; align-items: center; gap: 8px;
    }
    .info-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    .summary-list { list-style: none; }
    .summary-item {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      display: flex; gap: 12px;
    }
    .summary-item::before { content: "→"; color: var(--accent); font-weight: 900; }

    .table-container { overflow-x: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; min-width: 400px; }
    th { text-align: left; font-size: 0.75rem; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); }
    td { padding: 12px; font-size: 0.9rem; border-bottom: 1px solid rgba(255, 255, 255, 0.02); }

    .expert-box {
      background: linear-gradient(135deg, rgba(244, 63, 94, 0.1), transparent);
      border: 1px solid var(--accent-soft);
      padding: 24px;
      border-radius: 16px;
      font-style: italic;
      line-height: 1.7;
    }

    /* ── Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: var(--glass);
      backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      padding: 12px 30px;
      border-radius: 100px;
      display: flex; gap: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      z-index: 1500;
    }
    .nav-btn { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-decoration: none; }
    .nav-btn { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-decoration: none; }
    .nav-btn.active { color: var(--accent); }

    /* ── Action Buttons in Modal ── */
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 40px;
      justify-content: center;
    }
    .action-btn {
      flex: 1;
      max-width: 160px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.2); }
    .action-btn.primary { background: white; color: black; border: none; }
    .action-btn.primary:hover { background: #e2e8f0; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 100px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #18181b;
      color: white;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Print Layout ── */
    @media print {
      body * { visibility: hidden !important; }
      #modal, #modalContent, #modalContent * { visibility: visible !important; display: block !important; }
      #modal { position: absolute; top: 0; left: 0; background: white !important; padding: 0 !important; }
      #modalContent { width: 100% !important; max-width: none !important; background: white !important; color: black !important; border: none !important; padding: 0 !important; max-height: none !important; }
      .modal-close, .modal-actions, .info-label::after { display: none !important; }
      .info-label { color: black !important; border-bottom: 2px solid black !important; }
      .summary-item { background: #f4f4f5 !important; color: black !important; border: 1px solid #e4e4e7 !important; }
      .expert-box { background: #fef2f2 !important; color: black !important; border: 1px solid #fecaca !important; }
      td, th { color: black !important; border-bottom: 1px solid #e4e4e7 !important; }
      h1 { color: black !important; }
      .badge { border: 1px solid black !important; background: white !important; color: black !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="#" class="logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"/>
        </svg>
      </div>
      POLICY RADAR
    </a>
    <div id="status" style="font-size: 0.7rem; color: var(--text-muted); text-align: right;">Loading...</div>
  </div>
</header>

<section class="hero">
  <div class="hero-tag">Policy Radar AI Pipeline</div>
  <h1>복잡한 부동산 정책 흐름<br>가장 빠르고 정확하게 분석합니다.</h1>
</section>

<div class="slogan-section">
  <div class="slogan-box">
    <div class="slogan-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      모든 분석은 정부 공식 브리핑 원문만을 기반으로 합니다. (원문 바로가기 제공)
    </div>
    <div class="slogan-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      AI 정책 분석기(팩트체크·정치성향 배제·논문 리서치 정제)로 심층 인사이트를 제공합니다.
    </div>
    <div class="slogan-item">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      관심 자료의 링크 생성 및 PDF 출력 기능을 제공합니다.
    </div>
    <hr class="slogan-divider">
    <div class="slogan-notice">
      <span class="slogan-notice-mark">※</span>
      AI 정책 분석기 및 부가기능은 유료 전환 전 무료 제공 중입니다.
    </div>
  </div>
</div>

<div class="filter-container">
  <div class="filter-wrap" id="filters">
    <button class="filter-btn active" data-cat="all">전체</button>
    <button class="filter-btn" data-cat="F">부동산 금융정책</button>
    <button class="filter-btn" data-cat="X">부동산 세금정책</button>
    <button class="filter-btn" data-cat="S">부동산 공급·개발정책</button>
    <button class="filter-btn" data-cat="T">부동산 거래·법령</button>
    <button class="filter-btn" data-cat="R">부동산 임대·주거정책</button>
    <button class="filter-btn" data-cat="P">프롭테크</button>
  </div>
  <div class="cat-desc" id="catDesc">전체 부동산 관련 정책 자료를 모두 표시합니다.</div>
</div>

<main>
  <div id="container" class="post-grid">
    <!-- Cards will be injected here -->
  </div>
</main>

<!-- Bottom nav removed per user request -->

<div class="modal-overlay" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div id="toast">복사되었습니다.</div>

<script>
let posts = [];
let cat = 'all';
let currentPost = null;

const CAT_INFO = {
  all: "전체 부동산 관련 정책 자료를 모두 표시합니다.",
  F: "대출 규제(LTV·DSR), 금리 변동, 보증 보험 등 자금 조달 정책을 분석합니다.",
  X: "취득세, 종부세, 양도세 등 부동산 세제 개편 및 과세 표준을 분석합니다.",
  S: "공공 주택 공급, 3기 신도시, 재건축·재개발 및 SOC 개발 정책을 분석합니다.",
  T: "청약 제도, 부동산 거래 규제, 공인중개법, 시장 모니터링 정보를 분석합니다.",
  R: "전월세 상한제, 계약갱신학구권, 공공임대 및 주거 복지 지원책을 분석합니다.",
  P: "부동산 신기술, 프롭테크 스타트업, 디지털 부동산 서비스 정책을 분석합니다."
};

const CAT_NAMES = {
  F: "부동산 금융정책",
  X: "부동산 세금정책",
  S: "부동산 공급·개발정책",
  T: "부동산 거래·법령",
  R: "부동산 임대·주거정책",
  P: "프롭테크"
};

async function init() {
  try {
    const res = await fetch('posts.json?v=' + Date.now());
    posts = await res.json();
    render();
    
    if (posts.length > 0) {
      document.getElementById('status').innerHTML = `Last updated<br><b>${posts[0].date}</b>`;
    }

    // URL 파라미터 확인 (Deep Link)
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('id');
    if (postId) {
      setTimeout(() => show(postId), 500);
    }
  } catch (e) {
    console.error("Data load failed:", e);
    document.getElementById('container').innerHTML = '<div style="text-align:center;padding:100px;color:gray">데이터를 불러올 수 없습니다.</div>';
  }
}

function render() {
  const container = document.getElementById('container');
  const filtered = cat === 'all' ? posts : posts.filter(p => p.cat === cat);
  
  document.getElementById('catDesc').innerText = CAT_INFO[cat] || "";

  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:100px;color:gray">해당 데이터가 아직 없습니다.</div>';
    return;
  }

  container.innerHTML = filtered.map((p, i) => `
    <div class="post-card" style="animation: modalFade 0.5s ease backwards ${i * 0.05}s" onclick="show('${p.id}')">
      <div class="card-head">
        <span class="badge cat-${p.cat}">${CAT_NAMES[p.cat] || p.catName}</span>
        <span style="font-size:0.75rem; color:var(--text-muted)">${p.date}</span>
      </div>
      <h2 class="card-title">${p.headline}</h2>
      <div class="card-footer">
        <span>${p.source}</span>
        <span>•</span>
        <span>Premium Analysis</span>
      </div>
    </div>
  `).join('');
}

function show(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  currentPost = p;
  const modal = document.getElementById('modal');
  const content = document.getElementById('modalContent');
  
  content.innerHTML = `
    <div class="modal-close" onclick="closeM()">✕</div>
    <span class="badge cat-${p.cat}">${CAT_NAMES[p.cat] || p.catName}</span>
    <h1 style="margin:20px 0; line-height:1.3">${p.headline}</h1>
    <p style="color:var(--text-muted); font-size:0.85rem">발행: ${p.date} | 출처: ${p.source}</p>

    <div class="modal-actions">
      <button class="action-btn" onclick="copyLink('${p.id}')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke-linecap="round" stroke-linejoin="round"/>

  modal.style.display = 'flex';

}

function closeM() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = 'auto';
  // URL에서 파라미터 제거
  window.history.replaceState({}, document.title, window.location.pathname);
}

document.getElementById('filters').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  cat = e.target.dataset.cat;
  render();
});

function copyLink(id) {
  const url = `${window.location.origin}${window.location.pathname}?id=${id}`;
  const toast = document.getElementById('toast');
  const show = () => {
    toast.textContent = '🔗 링크가 복사되었습니다!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(show).catch(() => fallbackCopy(url, show));
  } else {
    fallbackCopy(url, show);
  }
}

function fallbackCopy(text, callback) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(el);
  el.focus(); el.select();
  try { document.execCommand('copy'); callback(); }
  catch(e) { alert('링크를 복사하지 못했습니다. 직접 복사해주세요:\n' + text); }
  document.body.removeChild(el);
}

function printPDF() {
  if (!currentPost) return;
  const p = currentPost;
  const catColor = { F:'#166534', X:'#92400e', S:'#1e40af', T:'#991b1b', R:'#9a3412', P:'#6b21a8' };
  const catBg    = { F:'#dcfce7', X:'#fef3c7', S:'#dbeafe', T:'#fee2e2', R:'#ffedd5', P:'#f3e8ff' };

  const col = catColor[p.cat] || '#333';
  const bg  = catBg[p.cat]   || '#f5f5f5';

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html lang="ko"><head>
    <meta charset="UTF-8">
    <title>${p.headline}</title>
    <style>
      @page { size: A4; margin: 14mm 14mm 12mm 14mm; }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      .page-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2.5px solid #e31837; padding-bottom: 7px; margin-bottom: 13px; }
      .logo { font-size: 12.5pt; font-weight: 800; color: #e31837; letter-spacing: -0.5px; }
      .header-meta { font-size: 7.5pt; color: #666; text-align: right; line-height: 1.5; }
      .badge { display: inline-block; padding: 3px 11px; background: ${bg}; color: ${col}; border-radius: 100px; font-size: 8pt; font-weight: 700; margin-bottom: 7px; }
      h1 { font-size: 13.5pt; font-weight: 800; line-height: 1.3; margin-bottom: 5px; color: #111; }
      .meta { font-size: 7.5pt; color: #666; margin-bottom: 13px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
      .section { margin-bottom: 11px; page-break-inside: avoid; }
      .sec-title { font-size: 8.5pt; font-weight: 700; color: ${col}; border-bottom: 1px solid ${col}; padding-bottom: 3px; margin-bottom: 7px; letter-spacing: 0.3px; }
      .s-item { display: flex; gap: 8px; padding: 5px 10px; background: #f8f8f8; border-left: 3px solid ${col}; margin-bottom: 4px; page-break-inside: avoid; }
      .s-num { font-weight: 700; color: ${col}; min-width: 14px; }
      table { width: 100%; border-collapse: collapse; page-break-inside: avoid; }
      th { background: #f4f4f5; font-weight: 700; padding: 5px 8px; text-align: left; border-bottom: 1.5px solid #ccc; font-size: 8pt; }
      td { padding: 4px 8px; border-bottom: 1px solid #eee; vertical-align: top; font-size: 9pt; }
      .num-cell { font-weight: 700; color: ${col}; }
      .c-item { display: flex; gap: 8px; padding: 5px 10px; background: #eff6ff; border-left: 3px solid #2563eb; margin-bottom: 4px; page-break-inside: avoid; }
      .c-arrow { color: #2563eb; font-weight: 700; }
      .expert-box { padding: 10px 14px; background: #fef2f2; border-left: 3px solid #e31837; border-radius: 0 8px 8px 0; font-style: italic; font-size: 9pt; page-break-inside: avoid; }
      .expert-name { margin-top: 8px; font-weight: 700; font-style: normal; font-size: 8pt; color: #e31837; text-align: right; }
      .page-footer { margin-top: 12px; padding-top: 7px; border-top: 1px solid #ddd; font-size: 7pt; color: #999; display: flex; justify-content: space-between; }
    </style>
  </head><body>
    <div class="page-header">
      <div class="logo">Policy Radar | AI Intelligence Pipeline</div>
      <div class="header-meta">${p.date}<br>출처: ${p.source}</div>

    <div class="meta">발행일: ${p.date} &nbsp;|&nbsp; 출처: ${p.source}</div>
    <div class="section">
      <div class="sec-title">핵심 정책 요약</div>
      ${summaryHTML}
    </div>
    ${keyDataHTML}
    ${expertHTML}
    ${checklistHTML}
    <div class="page-footer">
      <span>${p.sourceUrl}</span>
      <span>dda5jin-png.github.io/policyrader/</span>

  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 400);
}

init();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
