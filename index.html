<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>정책레이더 | 부동산·금융 지능형 분석 시스템</title>
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">

  <!-- Typography: Pretendard -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    :root {
      --primary: #0f172a; /* Slate 900 */
      --secondary: #1e293b; /* Slate 800 */
      --accent: #e11d48; /* Rose 600 */
      --bg: #f8fafc; /* Slate 50 */
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --glass: rgba(255, 255, 255, 0.7);
      --blur: blur(12px);
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      word-break: keep-all;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      padding: 12px 16px;
      padding-top: max(12px, env(safe-area-inset-top));
    }
    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--primary);
      text-decoration: none;
    }
    .logo svg { width: 28px; height: 28px; }

    /* ── Filter Bar ── */
    .filter-bar {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 16px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 8px 16px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }

    /* ── Main Content ── */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 16px 100px;
    }
    .section-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-left: 4px;
    }

    /* ── Post Cards ── */
    .post-card {
      background: var(--card-bg);
      backdrop-filter: var(--blur);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: fadeIn 0.5s ease backwards;
    }
    .post-card:active { transform: scale(0.98); }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .post-card .badge-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .category-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .cat-T { background: #fee2e2; color: #991b1b; } 
    .cat-F { background: #dcfce7; color: #166534; } 
    .cat-X { background: #fef9c3; color: #854d0e; } 
    .cat-S { background: #dbeafe; color: #1e40af; } 
    .cat-P { background: #f3e8ff; color: #6b21a8; } 

    .post-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.4;
      margin-bottom: 12px;
    }
    .post-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
    }
    .premium-star { color: #f59e0b; font-weight: 800; }

    /* ── Detail Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-content {
      width: 100%;
      max-width: 800px;
      background: white;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 32px 20px;
      position: relative;
      animation: slideUp 0.3s cubic-bezier(0, 1, 0, 1);
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 32px; height: 32px;
      background: #f1f5f9;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2rem;
    }

    .detail-label {
      display: inline-block;
      background: var(--primary);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      margin-bottom: 12px;
      margin-top: 24px;
    }
    .detail-text { font-size: 0.95rem; color: #334155; line-height: 1.7; margin-bottom: 12px; }
    .summary-box {
      background: #f8fafc;
      border-left: 4px solid var(--accent);
      padding: 16px;
      border-radius: 8px;
    }
    .summary-item { margin-bottom: 8px; display: flex; gap: 8px; }
    .summary-item::before { content: "•"; color: var(--accent); font-weight: 900; }

    .key-table {
      width: 100%; border-collapse: collapse; margin-top: 8px;
      font-size: 0.85rem;
    }
    .key-table th { text-align: left; background: #f1f5f9; padding: 10px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid #e2e8f0; }
    .key-table td { padding: 10px; border-bottom: 1px solid #f1f5f9; color: var(--primary); }

    /* ── Bottom Controls ── */
    .bottom-nav {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--primary);
      color: white;
      padding: 12px 24px;
      border-radius: 100px;
      display: flex; gap: 20px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
      z-index: 150;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; cursor: pointer; opacity: 0.8; }
    .nav-item.active { opacity: 1; font-weight: 700; }

  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"/>
      </svg>
      POLICY RADAR
    </a>
    <div id="lastUpdate" style="font-size: 0.7rem; color: var(--text-muted); text-align: right;">연결 중...</div>
  </div>
</header>

<div class="filter-bar" id="categoryFilters">
  <button class="filter-btn active" data-cat="all">전체</button>
  <button class="filter-btn" data-cat="T">거래·법령</button>
  <button class="filter-btn" data-cat="F">금융·거시</button>
  <button class="filter-btn" data-cat="X">세제·평가</button>
  <button class="filter-btn" data-cat="S">공급·개발</button>
</div>

<main id="mainList">
  <div class="section-title">최근 분석 리포트</div>
  <div id="postContainer">
    <div style="padding: 40px; text-align: center; color: var(--text-muted); font-size: 0.9rem;">
      데이터를 불러오고 있습니다...
    </div>
  </div>
</main>

<div class="bottom-nav">
  <div class="nav-item active" onclick="location.reload()">🏠 홈</div>
  <div class="nav-item" onclick="window.print()">🖨️ 인쇄</div>
  <div class="nav-item" onclick="shareApp()">🔗 공유</div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-content" id="modalBody"></div>
</div>

<script>
let allPosts = [];
let currentFilter = 'all';

async function loadPosts() {
  try {
    const res = await fetch('posts.json?t=' + Date.now());
    allPosts = await res.json();
    renderPosts();
    updateHeader();
  } catch (e) {
    document.getElementById('postContainer').innerHTML = `<div style="text-align:center;padding:40px;color:red">데이터 로드 실패</div>`;
  }
}

function updateHeader() {
  if (allPosts.length > 0) {
    const latestDate = allPosts[0].date;
    document.getElementById('lastUpdate').innerHTML = `최근 업데이트<br><b>${latestDate}</b>`;
  } else {
    document.getElementById('lastUpdate').innerHTML = `업데이트 데이터<br>없음`;
  }
}

function renderPosts() {
  const container = document.getElementById('postContainer');
  const filtered = currentFilter === 'all' ? allPosts : allPosts.filter(p => p.cat === currentFilter);
  
  if (filtered.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:80px;color:var(--text-muted)">현재 실시간 분석 데이터가 없습니다.<br>GitHub Actions 가동을 시작해주세요.</div>`;
    return;
  }

  container.innerHTML = filtered.map((p, idx) => `
    <div class="post-card" style="animation-delay: ${idx * 0.05}s" onclick="openDetail('${p.id}')">
      <div class="badge-row">
        <span class="category-badge cat-${p.cat}">${p.catName || '카테고리'}</span>
        <span class="post-meta">${p.date}</span>
      </div>
      <div class="post-title">${p.premium ? '<span class="premium-star">★</span> ' : ''}${p.headline}</div>
      <div class="post-meta">
        <span>📍 ${p.source}</span>
        <span>•</span>
        <span>${p.views || 0} 조회</span>
      </div>
    </div>
  `).join('');
}

function openDetail(id) {
  const p = allPosts.find(x => x.id === id);
  if (!p) return;

  const modal = document.getElementById('detailModal');
  const body = document.getElementById('modalBody');
  
  body.innerHTML = `
    <div class="modal-close" onclick="closeModal()">✕</div>
    <span class="category-badge cat-${p.cat}">${p.catName}</span>
    <h1 style="font-size:1.5rem;font-weight:800;margin:12px 0;line-height:1.3;color:var(--primary)">${p.headline}</h1>
    <div class="post-meta" style="margin-bottom:20px">
      📅 ${p.date} &nbsp; | &nbsp; 출처: ${p.source}
    </div>

    <div class="detail-label">핵심 정책 요약</div>
    <div class="summary-box">
      ${p.summary.map(s => `<div class="summary-item">${s}</div>`).join('')}
    </div>

    <div class="detail-label">AI 심층 분석</div>
    <div class="detail-text" style="background:#f1f5f9;padding:16px;border-radius:12px;font-style:italic">
      "${p.expertOpinions[0].comment}"
      <div style="font-size:0.75rem;margin-top:10px;text-align:right">- ${p.expertOpinions[0].name} (${p.expertOpinions[0].affiliation})</div>
    </div>

    <div class="detail-label">주요 수치 및 대상</div>
    <table class="key-table">
      <thead><tr><th>항목</th><th>수치</th><th>적용대상</th></tr></thead>
      <tbody>
        ${p.keyData && p.keyData.length > 0 ? p.keyData.map(d => `<tr><td>${d.항목}</td><td><strong>${d.수치}</strong></td><td>${d.적용대상}</td></tr>`).join('') : '<tr><td colspan="3" style="text-align:center">상세 수치 데이터 없음</td></tr>'}
      </tbody>
    </table>

    <div class="detail-label">사용자 체크리스트</div>
    ${p.checklist.map(c => `<div class="summary-item">${c}</div>`).join('')}

    <div style="margin-top:40px; padding:20px; border-top:1px solid #eee; text-align:center">
      <button onclick="window.open('${p.sourceUrl}')" style="background:var(--primary);color:white;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer">보도자료 원문 보기</button>
    </div>
  `;
  
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('detailModal').style.display = 'none';
  document.body.style.overflow = 'auto';
}

document.getElementById('categoryFilters').addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.cat;
  renderPosts();
});

function shareApp() {
  if (navigator.share) {
    navigator.share({ title: '정책레이더', url: location.href });
  } else {
    alert('공유 기능을 지원하지 않는 브라우저입니다.');
  }
}

loadPosts();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
