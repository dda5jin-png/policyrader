name: Update Policy Posts

on:
  schedule:
    - cron: '7 0 * * *'  # 매일 한국시간 오전 9시 07분 (UTC 00:07)
    - cron: '7 6 * * *'  # 매일 한국시간 오후 3시 07분 (UTC 06:07), 경량 수집
  workflow_dispatch:      # 수동 실행 허용

jobs:
  update-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f agent/requirements.txt ]; then pip install -r agent/requirements.txt; fi

      - name: Configure run profile
        run: |
          if [ "${{ github.event.schedule }}" = "7 6 * * *" ]; then
            echo "RUN_PROFILE=light" >> "$GITHUB_ENV"
            echo "ANALYZER_LIMIT_COUNT=3" >> "$GITHUB_ENV"
            echo "ANALYZER_MAX_RETRIES=1" >> "$GITHUB_ENV"
            echo "ANALYZER_BETWEEN_POST_DELAY_SECONDS=5" >> "$GITHUB_ENV"
          else
            echo "RUN_PROFILE=standard" >> "$GITHUB_ENV"
            echo "ANALYZER_LIMIT_COUNT=10" >> "$GITHUB_ENV"
            echo "ANALYZER_MAX_RETRIES=3" >> "$GITHUB_ENV"
            echo "ANALYZER_BETWEEN_POST_DELAY_SECONDS=30" >> "$GITHUB_ENV"
          fi

      - name: Run agent script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          ANALYZER_LIMIT_COUNT: ${{ env.ANALYZER_LIMIT_COUNT }}
          ANALYZER_MAX_RETRIES: ${{ env.ANALYZER_MAX_RETRIES }}
          ANALYZER_BETWEEN_POST_DELAY_SECONDS: ${{ env.ANALYZER_BETWEEN_POST_DELAY_SECONDS }}
        run: |
          python agent/main.py

      - name: Commit and push changes
        env:
          TZ: Asia/Seoul
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/posts.json public/insights.json
          git commit -m "chore: auto-update policy posts and insights (${RUN_PROFILE}) [$(date +'%Y-%m-%d %H:%M:%S KST')]" || echo "No changes to commit"
          git push

      # Vercel Deploy Hook이 있다면 아래와 같이 추가하여 강제 빌드를 트리거할 수 있습니다.
      # - name: Trigger Vercel Deploy
      #   if: success()
      #   run: |
      #     curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
