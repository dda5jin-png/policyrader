name: Update Policy Posts

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 한국시간 오전 9시 (UTC 00:00)
  workflow_dispatch:      # 수동 실행 허용

jobs:
  update-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f agent/requirements.txt ]; then pip install -r agent/requirements.txt; fi

      - name: Run agent script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          python agent/main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/posts.json
          git commit -m "chore: auto-update policy posts [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push
